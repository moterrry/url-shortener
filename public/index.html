<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #2d3436;
      --text-secondary: #636e72;
      --accent: #6c5ce7;
      --accent-hover: #5b4cdb;
      --border: #e0e0e0;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    .dark {
      --bg: #1a1a2e;
      --card: #16213e;
      --text: #e8e8e8;
      --text-secondary: #a0a0a0;
      --accent: #a29bfe;
      --accent-hover: #b8b2ff;
      --border: #2d2d4a;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .logo svg {
      width: 28px;
      height: 28px;
      fill: var(--accent);
    }

    .theme-toggle {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .theme-toggle:hover {
      background: var(--accent);
    }

    .theme-toggle svg {
      width: 22px;
      height: 22px;
      fill: var(--text);
      transition: fill 0.3s ease;
    }

    .theme-toggle:hover svg {
      fill: white;
    }

    .dark .sun { display: none; }
    .dark .moon { display: block; }
    .light .sun { display: block; }
    .light .moon { display: none; }

    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px var(--shadow);
      margin-bottom: 1.5rem;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .row {
      display: flex;
      gap: 0.75rem;
    }

    .row input {
      flex: 1;
    }

    input[type="text"], input[type="number"], select {
      padding: 0.875rem 1rem;
      font-size: 0.95rem;
      font-family: inherit;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s ease;
      outline: none;
    }

    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      border-color: var(--accent);
    }

    .btn {
      padding: 0.875rem 1.25rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-small {
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
    }

    .message {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
    }

    .message.success {
      background: rgba(108, 92, 231, 0.15);
      color: var(--accent);
      display: block;
    }

    .message.error {
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
      display: block;
    }

    .result {
      display: none;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .result.show {
      display: block;
    }

    .short-url {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }

    .short-url a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .short-url a:hover {
      text-decoration: underline;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 6px;
      transition: background 0.2s ease;
    }

    .copy-btn:hover {
      background: var(--border);
    }

    .copy-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--text);
    }

    .result-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .result-meta span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    h2 {
      font-size: 1.125rem;
      margin-bottom: 1rem;
    }

    .url-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .url-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0.75rem;
      border-radius: 8px;
      background: var(--bg);
      margin-bottom: 0.5rem;
    }

    .url-item-top {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .url-item-top a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .url-item-top a:hover {
      text-decoration: underline;
    }

    .url-item-stats {
      display: flex;
      gap: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .url-item-actions {
      display: flex;
      gap: 0.25rem;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.4rem;
      border-radius: 6px;
      transition: background 0.2s ease;
    }

    .icon-btn:hover {
      background: var(--border);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      fill: var(--text-secondary);
    }

    .icon-btn.analytics:hover {
      background: var(--accent);
    }

    .icon-btn.analytics:hover svg {
      fill: white;
    }

    .icon-btn.delete:hover svg {
      fill: #e74c3c;
    }

    .url-item-original {
      font-size: 0.7rem;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-left: 0.25rem;
    }

    .expired-badge {
      background: #e74c3c;
      color: white;
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.5rem;
    }

    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      padding: 2rem;
      font-size: 0.875rem;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--card);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .modal-header h3 {
      font-size: 1.1rem;
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 6px;
    }

    .modal-close:hover {
      background: var(--border);
    }

    .modal-close svg {
      width: 20px;
      height: 20px;
      fill: var(--text);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-box {
      background: var(--bg);
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .chart-container {
      position: relative;
      height: 200px;
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 2rem 0 1rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 500px) {
      .row {
        flex-direction: column;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body class="light">
  <div class="container">
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
        URL Shortener
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <svg class="sun" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
        <svg class="moon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
      </button>
    </header>

    <div class="card">
      <div class="input-group">
        <input type="text" id="urlInput" placeholder="Paste your long URL here..." autocomplete="off">
        <div class="row">
          <select id="expiresIn">
            <option value="">No expiration</option>
            <option value="1">1 hour</option>
            <option value="24">24 hours</option>
            <option value="72">3 days</option>
            <option value="168">1 week</option>
            <option value="720">1 month</option>
          </select>
          <button class="btn btn-primary" onclick="shortenUrl()" id="shortenBtn">Shorten</button>
        </div>
      </div>
      <div class="message" id="message"></div>

      <div class="result" id="result">
        <div class="short-url">
          <a href="#" id="shortLink" target="_blank"></a>
          <button class="copy-btn" onclick="copyUrl(document.getElementById('shortLink').href)" title="Copy">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          </button>
        </div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
    </div>

    <div class="card">
      <h2>Recent URLs</h2>
      <div class="url-list" id="urlList">
        <div class="empty-state">No URLs shortened yet</div>
      </div>
    </div>

    <footer>
      Made with ♥ by <a href="https://github.com/moterrry" target="_blank">github.com/moterrry</a>
    </footer>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Analytics</h3>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="totalClicks">0</div>
          <div class="stat-label">Total Clicks</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="todayClicks">0</div>
          <div class="stat-label">Today</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="uniqueDays">0</div>
          <div class="stat-label">Active Days</div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="clicksChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const message = document.getElementById('message');
    const result = document.getElementById('result');
    const shortLink = document.getElementById('shortLink');
    const resultMeta = document.getElementById('resultMeta');
    const urlList = document.getElementById('urlList');
    const shortenBtn = document.getElementById('shortenBtn');
    const modal = document.getElementById('modal');
    let chart = null;

    function getBaseUrl() {
      return window.location.origin;
    }

    function loadTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
      }
    }

    function toggleTheme() {
      const isDark = document.body.classList.contains('dark');
      if (isDark) {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        localStorage.setItem('theme', 'light');
      } else {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
      if (chart) updateChartColors();
    }

    function updateChartColors() {
      const isDark = document.body.classList.contains('dark');
      const textColor = isDark ? '#a0a0a0' : '#636e72';
      const gridColor = isDark ? '#2d2d4a' : '#e0e0e0';

      if (chart) {
        chart.options.scales.x.ticks.color = textColor;
        chart.options.scales.y.ticks.color = textColor;
        chart.options.scales.x.grid.color = gridColor;
        chart.options.scales.y.grid.color = gridColor;
        chart.update();
      }
    }

    async function shortenUrl() {
      const url = urlInput.value.trim();
      const expiresIn = document.getElementById('expiresIn').value;

      if (!url) {
        showMessage('Please enter a URL', 'error');
        return;
      }

      shortenBtn.disabled = true;
      shortenBtn.textContent = 'Shortening...';

      try {
        const res = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, expiresIn: expiresIn ? parseInt(expiresIn) : null })
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.error || 'Failed to shorten URL', 'error');
          return;
        }

        const shortUrl = `${getBaseUrl()}/${data.shortCode}`;
        shortLink.href = shortUrl;
        shortLink.textContent = shortUrl;

        let metaHtml = `<span>Created: ${new Date(data.created_at).toLocaleDateString()}`;
        if (data.expiresAt) {
          const expDate = new Date(data.expiresAt);
          const isExpired = expDate < new Date();
          metaHtml += isExpired ? '<span class="expired-badge">Expired</span>' : `<br>Expires: ${expDate.toLocaleDateString()}`;
        }
        metaHtml += '</span>';
        resultMeta.innerHTML = metaHtml;

        result.classList.add('show');
        showMessage('', '');

        loadUrls();
      } catch (err) {
        showMessage('Something went wrong', 'error');
      } finally {
        shortenBtn.disabled = false;
        shortenBtn.textContent = 'Shorten';
      }
    }

    async function loadUrls() {
      try {
        const res = await fetch('/api/urls');
        const urls = await res.json();

        if (urls.length === 0) {
          urlList.innerHTML = '<div class="empty-state">No URLs shortened yet</div>';
          return;
        }

        const now = new Date();
        urlList.innerHTML = urls.map(u => {
          const isExpired = u.expires_at && new Date(u.expires_at) < now;
          return `
            <div class="url-item">
              <div class="url-item-top">
                <a href="${getBaseUrl()}/${u.short_code}" target="_blank">${getBaseUrl()}/${u.short_code}</a>
                ${isExpired ? '<span class="expired-badge">Expired</span>' : ''}
                <div class="url-item-actions">
                  <button class="icon-btn analytics" onclick="showAnalytics('${u.short_code}')" title="Analytics">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                  </button>
                  <button class="icon-btn" onclick="copyUrl('${getBaseUrl()}/${u.short_code}')" title="Copy">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                  </button>
                  <button class="icon-btn delete" onclick="deleteUrl('${u.short_code}')" title="Delete">
                    <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                  </button>
                </div>
              </div>
              <div class="url-item-stats">
                <span>${u.click_count} clicks</span>
                <span>Created ${new Date(u.created_at).toLocaleDateString()}</span>
              </div>
              <div class="url-item-original">${u.original_url}</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Failed to load URLs:', err);
      }
    }

    async function showAnalytics(shortCode) {
      try {
        const res = await fetch(`/api/urls/${shortCode}`);
        const data = await res.json();

        if (!res.ok) {
          showMessage(data.error || 'Failed to load analytics', 'error');
          return;
        }

        document.getElementById('totalClicks').textContent = data.click_count;
        document.getElementById('uniqueDays').textContent = data.analytics.length;

        const today = new Date().toISOString().split('T')[0];
        const todayData = data.analytics.find(a => a.date === today);
        document.getElementById('todayClicks').textContent = todayData ? todayData.count : 0;

        const labels = data.analytics.map(a => {
          const d = new Date(a.date);
          return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }).reverse();
        const counts = data.analytics.map(a => a.count).reverse();

        if (chart) {
          chart.destroy();
        }

        const isDark = document.body.classList.contains('dark');
        const textColor = isDark ? '#a0a0a0' : '#636e72';
        const gridColor = isDark ? '#2d2d4a' : '#e0e0e0';
        const accentColor = isDark ? '#a29bfe' : '#6c5ce7';

        const ctx = document.getElementById('clicksChart').getContext('2d');
        chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels.length ? labels : ['No data'],
            datasets: [{
              label: 'Clicks',
              data: counts.length ? counts : [0],
              borderColor: accentColor,
              backgroundColor: accentColor + '20',
              fill: true,
              tension: 0.4,
              pointRadius: 4,
              pointBackgroundColor: accentColor
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false }
            },
            scales: {
              x: {
                ticks: { color: textColor },
                grid: { color: gridColor }
              },
              y: {
                beginAtZero: true,
                ticks: { color: textColor, stepSize: 1 },
                grid: { color: gridColor }
              }
            }
          }
        });

        modal.classList.add('show');
      } catch (err) {
        showMessage('Failed to load analytics', 'error');
      }
    }

    async function deleteUrl(shortCode) {
      try {
        await fetch(`/api/urls/${shortCode}`, { method: 'DELETE' });
        loadUrls();
      } catch (err) {
        console.error('Failed to delete URL:', err);
      }
    }

    function copyUrl(url) {
      navigator.clipboard.writeText(url).then(() => {
        showMessage('Copied to clipboard!', 'success');
        setTimeout(() => showMessage('', ''), 2000);
      });
    }

    function closeModal() {
      modal.classList.remove('show');
    }

    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'message';
      if (text && type) {
        message.classList.add(type);
      }
    }

    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') shortenUrl();
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    loadTheme();
    loadUrls();
  </script>
</body>
</html>
